<!-- Display some star wars data to the screen -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Star Wars data</title>
</head>
<body>
    <h1>Data from the star wars API</h1>
    <div class="listHeading">
        <h2 class="characterListHeading">Star wars characters</h2>
        <h3 class="indicatorButton"><--Click me to display character names</h2>
    </div>
    <ul class="peopleList"></ul>
    <div class="listHeading">
        <h2 class="planetListHeading">Star wars planets</h2>
        <h3 class="indicatorButton"><--Click me to display planet names</h2>
    </div>
    <ul class="planetsList"></ul>
    <div class="listHeading">
        <h2 class="vehicleListHeading">Star wars vehicles</h2>
        <h3 class="indicatorButton"><--Click me to display vehicle names</h2>
    </div>
    <ul class="vehiclesList"></ul>
    <script src="AsyncFunctions.js"></script>
</body>
</html>
